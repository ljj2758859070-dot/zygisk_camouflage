name: Build Zygisk PropSpoof
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download & Extract NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -qq android-ndk-r25c-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Build & Package Module
        run: |
          cd jni
          $ANDROID_NDK/ndk-build V=1 APP_ABI=arm64-v8a
          cd ../
          mkdir -p output/zygisk
          # ✅ 修改路径：libs 在仓库根目录，不再写 jni/libs
          find libs -name "libzygisk_hook.so" -exec cp {} output/zygisk/arm64-v8a.so \;
          cp module.prop output/
          cd output
          zip -r ../PropSpoof_Module.zip .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PropSpoof-Module
          path: PropSpoof_Module.zip
