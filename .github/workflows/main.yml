name: Build Zygisk Camouflage Module
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download & Extract NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -qq android-ndk-r25c-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Build with ndk-build
        run: |
          cd jni
          $ANDROID_NDK/ndk-build V=1
          ls -R obj/local/arm64-v8a/
          cd ..

      - name: Package Magisk Module
        run: |
          mkdir -p output/zygisk
          cp jni/obj/local/arm64-v8a/libzygisk_hook.so output/zygisk/arm64-v8a.so
          cp module.prop output/
          cp *.sh output/
          cd output
          zip -r ../Zygisk_Camouflage.zip .

      - name: Upload Module Zip
        uses: actions/upload-artifact@v4
        with:
          name: Zygisk-Camouflage
          path: Zygisk_Camouflage.zip
