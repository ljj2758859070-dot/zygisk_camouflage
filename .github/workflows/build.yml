name: Build Zygisk Camouflage Module
on:
  workflow_dispatch:

jobs:
  build_task:
    runs-on: ubuntu-latest
    steps:
      - name: Pull repository files
        uses: actions/checkout@v4

      - name: Download Android NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Start ndk-build compile arm64-v8a
        run: |
          cd jni
          $ANDROID_NDK_HOME/ndk-build
          cd ..

      - name: Strip remove symbol table
        run: |
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-strip --strip-all jni/libs/arm64-v8a/libzygisk_hook.so

      - name: Package Magisk Module
        run: |
          mkdir -p output/zygisk
          cp jni/libs/arm64-v8a/libzygisk_hook.so output/zygisk/arm64-v8a.so
          cp module.prop output/
          cp post-fs-data.sh output/
          cp service.sh output/
          cd output
          zip -r ../DFM_Camouflage_Module.zip .

      - name: Upload compiled zip
        uses: actions/upload-artifact@v4
        with:
          name: DFM-Camouflage-Module
          path: DFM_Camouflage_Module.zip
